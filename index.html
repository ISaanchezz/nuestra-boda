<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda de Iván & Nuria</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --color-sobre: #decba4;
            --color-lacre: #8b1e1e;
            --color-dorado: #d4a373;
            --color-texto: #4a4e3d;
            --texture: url('https://www.transparenttextures.com/patterns/felt.png');
        }

        body { margin: 0; font-family: 'Playfair Display', serif; background: #fdfaf5; overflow-x: hidden; color: var(--color-texto); text-align: center; scroll-behavior: smooth; }

        /* --- CONTENEDOR PRINCIPAL --- */
        .envelope-wrapper {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: #f4f1ea; perspective: 1500px; z-index: 1000;
            transition: opacity 1s ease 2.5s;
        }
        .envelope-wrapper.hidden { opacity: 0; pointer-events: none; visibility: hidden; position: fixed; }

        /* --- SOBRE ESTRUCTURA --- */
        .envelope {
            position: relative; width: 550px; height: 380px;
            background: #e7d8b8; background-image: var(--texture);
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            cursor: pointer; border-radius: 4px;
        }

        /* Solapa Superior (Pico más largo para cubrir bien) */
        .flap {
            position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-top: 240px solid #d4c197; /* Pico más alto */
            border-left: 275px solid transparent; 
            border-right: 275px solid transparent;
            transform-origin: top; transition: transform 0.8s ease-in-out; 
            z-index: 60; /* Siempre encima de la carta al inicio */
        }

        /* Cuerpo del sobre (Frontal) */
        .front { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 50; pointer-events: none; }
        .front::before { 
            content: ""; position: absolute; bottom: 0; left: 0; 
            border-bottom: 380px solid #e7d8b8; border-right: 275px solid transparent; 
            background-image: var(--texture);
        }
        .front::after { 
            content: ""; position: absolute; bottom: 0; right: 0; 
            border-bottom: 380px solid #e7d8b8; border-left: 275px solid transparent; 
            background-image: var(--texture);
        }

        .seal {
            position: absolute; top: 200px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 80px; background: var(--color-lacre); border-radius: 50%;
            z-index: 70; display: flex; justify-content: center; align-items: center;
            color: #f3e5ab; font-weight: bold; font-size: 1.6rem; border: 2px solid #721616;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: opacity 0.3s;
        }

        /* --- LA CARTA (ESCONDIDA AL PRINCIPIO) --- */
        .card-invitation {
            position: absolute; 
            top: 40px; /* Metida dentro del sobre */
            left: 35px; width: 480px; height: 330px;
            background: #fff; 
            z-index: 20; /* Detrás del front y la flap */
            padding: 40px; box-sizing: border-box;
            box-shadow: 0 0 10px rgba(0,0,0,0.1); 
            background-image: var(--texture);
            transition: transform 1.8s cubic-bezier(0.4, 0, 0.2, 1) 0.8s, z-index 0.1s linear 1s;
        }

        /* --- ANIMACIÓN AL ABRIR --- */
        .envelope.open .flap { transform: rotateX(180deg); z-index: 10; } /* La solapa se va atrás al abrirse */
        .envelope.open .seal { opacity: 0; pointer-events: none; }
        
        .envelope.open .card-invitation { 
            /* Sube, cambia de capa para estar delante y se centra */
            transform: translateY(-280px) scale(1.1); 
            z-index: 100; /* Salta al frente después de que la solapa se abra */
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        /* --- WEB --- */
        #main-content { display: none; opacity: 0; transition: opacity 1.5s ease; padding: 40px 15px; }
        h1 { font-family: 'Dancing Script'; font-size: 4.5rem; color: var(--color-dorado); margin: 0; }
        .section { margin: 80px auto; max-width: 1000px; }
        .timer-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); min-width: 80px; }
        .timer-num { display: block; font-size: 2.5rem; font-weight: bold; color: var(--color-dorado); }
        .btn-premium { display: inline-block; padding: 15px 35px; background: var(--color-dorado); color: white; border-radius: 50px; text-decoration: none; font-weight: bold; cursor: pointer; border:none; }

        /* Móvil */
        @media (max-width: 600px) {
            .envelope { width: 340px; height: 240px; }
            .flap { border-top-width: 150px; border-left-width: 170px; border-right-width: 170px; }
            .front::before { border-bottom-width: 240px; border-right-width: 170px; }
            .front::after { border-bottom-width: 240px; border-left-width: 170px; }
            .card-invitation { width: 300px; height: 210px; left: 20px; top: 20px; }
            .envelope.open .card-invitation { transform: translateY(-180px) scale(1.05); }
            .seal { top: 125px; width: 60px; height: 60px; }
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <audio id="wedding-song" src="musica.mp3" preload="auto" loop></audio>

    <div class="envelope-wrapper" id="wrapper">
        <div class="envelope" id="envelope" onclick="openEnvelope()">
            <div class="flap"></div>
            <div class="front"></div>
            <div class="seal">I & N</div>
            <div class="card-invitation">
                <h2 style="font-family: 'Dancing Script'; color: var(--color-dorado); margin-top: 0; font-size: 2rem;">¡Nos Casamos!</h2>
                <div style="font-size: 1.6rem; margin: 10px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 10px 0;">Iván & Nuria</div>
                <p style="font-size: 1rem; color: #555;">Estás invitado a nuestro gran día</p>
                <p style="color: #999; font-size: 0.8rem; margin-top: 15px;">Toca para abrir</p>
            </div>
        </div>
    </div>

    <div id="main-content">
        <h1 data-aos="fade-down">Iván & Nuria</h1>
        <p style="letter-spacing: 5px; color: #888;">NUESTRO GRAN DÍA</p>
        
        <div class="section" data-aos="fade-up">
            <div style="display: flex; justify-content: center; gap: 15px;">
                <div class="timer-box"><span id="days" class="timer-num">00</span><small>Días</small></div>
                <div class="timer-box"><span id="hours" class="timer-num">00</span><small>Horas</small></div>
                <div class="timer-box"><span id="mins" class="timer-num">00</span><small>Min</small></div>
            </div>
        </div>

        <div class="section" data-aos="zoom-in" style="background: white; padding: 40px 20px; border-radius: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.05); max-width: 600px;">
            <h2 style="font-family: 'Dancing Script'; font-size: 2.5rem; color: var(--color-dorado);">Confirmar Asistencia</h2>
            <form id="wedding-form">
                <input type="text" name="Nombre" placeholder="Tu nombre" required style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:1px solid #ddd;">
                <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;">
                    <label style="flex:1 1 100%; font-weight:bold; text-align:left;">Preferencias:</label>
                    <label style="background:#f9f9f9; padding:10px; border-radius:8px; flex:1 1 45%; display:flex; align-items:center; gap:5px;"><input type="checkbox" name="Preferencia" value="Vegano"> Vegano</label>
                    <label style="background:#f9f9f9; padding:10px; border-radius:8px; flex:1 1 45%; display:flex; align-items:center; gap:5px;"><input type="checkbox" name="Preferencia" value="Celíaco"> Celíaco</label>
                </div>
                <button type="submit" id="submit-btn" class="btn-premium" style="width:100%">Enviar</button>
            </form>
            <div id="success-msg" style="display:none; padding:20px;"><h3>¡Nos vemos pronto! ✨</h3></div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        function openEnvelope() {
            const song = document.getElementById('wedding-song');
            song.volume = 0.2;
            song.play().catch(() => {});
            
            document.getElementById('envelope').classList.add('open');

            setTimeout(() => {
                document.getElementById('wrapper').classList.add('hidden');
                document.getElementById('main-content').style.display = 'block';
                setTimeout(() => document.getElementById('main-content').style.opacity = '1', 100);
            }, 4500); 
        }

        // Cuenta atrás básica
        const weddingDate = new Date("Sep 20, 2026 18:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const d = weddingDate - now;
            if (d > 0) {
                document.getElementById("days").innerText = Math.floor(d / (1000 * 60 * 60 * 24));
                document.getElementById("hours").innerText = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById("mins").innerText = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));
            }
        }, 1000);

        // Envío
        document.getElementById('wedding-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            
            const scriptURL = 'https://script.google.com/macros/s/AKfycbwUGZoeNWv4jb2d-qHCZbF_6kQ2TxXqtwqewvMsKg3RBtth0FG9THm5zqDkz827w7q5EQ/exec';
            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: new URLSearchParams(new FormData(this)) })
            .then(() => {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                this.style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
            });
        });
    </script>
</body>
</html>
