<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda de Iván & Nuria</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --color-sobre: #decba4;
            --color-lacre: #8b1e1e;
            --color-dorado: #d4a373;
            --color-texto: #4a4e3d;
            --texture: url('https://www.transparenttextures.com/patterns/felt.png');
        }

        body { margin: 0; font-family: 'Playfair Display', serif; background: #fdfaf5; overflow-x: hidden; color: var(--color-texto); text-align: center; scroll-behavior: smooth; }

        /* --- SOBRE --- */
        .envelope-wrapper {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: #f4f1ea; perspective: 1500px; z-index: 1000;
            transition: opacity 1s ease 1.5s;
        }
        .envelope-wrapper.hidden { opacity: 0; pointer-events: none; visibility: hidden; position: fixed; }

        .envelope {
            position: relative; width: 550px; height: 380px;
            background: #e7d8b8; background-image: var(--texture);
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            cursor: pointer; border-radius: 4px; transition: transform 0.5s;
        }

        .flap {
            position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-top: 210px solid #d4c197; border-left: 275px solid transparent; border-right: 275px solid transparent;
            transform-origin: top; transition: transform 0.8s ease-in-out; z-index: 50;
        }

        .front { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 40; }
        .front::before { content: ""; position: absolute; bottom: 0; left: 0; border-bottom: 380px solid #e7d8b8; border-right: 275px solid transparent; background-image: var(--texture); }
        .front::after { content: ""; position: absolute; bottom: 0; right: 0; border-bottom: 380px solid #e7d8b8; border-left: 275px solid transparent; background-image: var(--texture); }

        .seal {
            position: absolute; top: 180px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 80px; background: var(--color-lacre); border-radius: 50%;
            z-index: 60; display: flex; justify-content: center; align-items: center;
            color: #f3e5ab; font-weight: bold; font-size: 1.6rem; border: 2px solid #721616;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: opacity 0.3s;
        }

        /* --- CARTA ANIMADA --- */
        .card-invitation {
            position: absolute; top: 15px; left: 35px; width: 480px; height: 350px;
            background: #fff; z-index: 30; padding: 40px; box-sizing: border-box;
            box-shadow: 0 0 15px rgba(0,0,0,0.05); background-image: var(--texture);
            /* Animación en dos pasos: salir y centrar */
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1) 0.8s, 
                        width 1s ease 1s, height 1s ease 1s, left 1s ease 1s;
        }

        /* Estado Abierto: Primero sube (translateY -350px) y luego baja al centro */
        .envelope.open .flap { transform: rotateX(180deg); z-index: 20; }
        .envelope.open .seal { opacity: 0; pointer-events: none; }
        
        /* La carta sube para salir y luego se posiciona visualmente en el centro */
        .envelope.open .card-invitation { 
            transform: translateY(-100px) scale(1.1); 
            z-index: 100;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        /* --- CONTENIDO WEB --- */
        #main-content { display: none; opacity: 0; transition: opacity 1.5s ease; padding: 40px 15px; }
        h1 { font-family: 'Dancing Script'; font-size: 4.5rem; color: var(--color-dorado); margin: 0; }
        .section { margin: 80px auto; max-width: 1000px; }

        .timer-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); min-width: 80px; }
        .timer-num { display: block; font-size: 2.5rem; font-weight: bold; color: var(--color-dorado); }

        .btn-premium { display: inline-block; padding: 15px 35px; background: var(--color-dorado); color: white; border-radius: 50px; text-decoration: none; font-weight: bold; transition: 0.3s; border: none; cursor: pointer; }

        /* Formulario */
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; }
        .checkbox-item { 
            display: flex; align-items: center; gap: 10px; font-size: 0.95rem; 
            background: #fff; padding: 10px 15px; border-radius: 8px; border: 1px solid #eee;
            flex: 1 1 calc(50% - 12px); min-width: 140px; cursor: pointer;
        }

        @media (max-width: 600px) {
            .envelope { width: 340px; height: 240px; }
            .flap { border-top-width: 130px; border-left-width: 170px; border-right-width: 170px; }
            .front::before { border-bottom-width: 240px; border-right-width: 170px; }
            .front::after { border-bottom-width: 240px; border-left-width: 170px; }
            .card-invitation { width: 300px; height: 210px; left: 20px; padding: 20px; }
            .seal { top: 110px; width: 60px; height: 60px; }
            .checkbox-item { flex: 1 1 100%; }
        }
    </style>
</head>
<body>

    <audio id="wedding-song" src="musica.mp3" preload="auto" loop></audio>

    <div class="envelope-wrapper" id="wrapper">
        <div class="envelope" id="envelope" onclick="openEnvelope()">
            <div class="flap"></div>
            <div class="front"></div>
            <div class="seal">I & N</div>
            <div class="card-invitation" id="the-card">
                <h2 style="font-family: 'Dancing Script'; color: var(--color-dorado); margin-top: 0;">¡Nos Casamos!</h2>
                <div style="font-size: 1.8rem; margin: 10px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 10px 0;">Iván & Nuria</div>
                <p style="font-size: 1.1rem; color: #555;">Estás invitado a nuestro gran día</p>
                <p style="color: #999; font-size: 0.8rem; margin-top: 20px;">Preparando tu invitación...</p>
            </div>
        </div>
    </div>

    <div id="main-content">
        <h1 data-aos="fade-down">Iván & Nuria</h1>
        <p style="letter-spacing: 5px; color: #888;">NUESTRO GRAN DÍA</p>

        <div class="section" data-aos="fade-up">
            <div style="display: flex; justify-content: center; gap: 15px;">
                <div class="timer-box"><span id="days" class="timer-num">00</span><small>Días</small></div>
                <div class="timer-box"><span id="hours" class="timer-num">00</span><small>Horas</small></div>
                <div class="timer-box"><span id="mins" class="timer-num">00</span><small>Min</small></div>
            </div>
        </div>

        <div class="section" data-aos="zoom-in" style="background: white; padding: 40px 20px; border-radius: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.05); max-width: 700px;">
            <h2 style="font-family: 'Dancing Script'; font-size: 3rem; color: var(--color-dorado);">Confirmar Asistencia</h2>
            <form id="wedding-form">
                <input type="text" name="Nombre" placeholder="Nombre completo" required style="width:100%; padding:14px; margin-bottom:15px; border-radius:10px; border:1px solid #ddd;">
                <div class="checkbox-group">
                    <label class="checkbox-item"><input type="checkbox" name="Preferencia" value="Ninguna"> Ninguna</label>
                    <label class="checkbox-item"><input type="checkbox" name="Preferencia" value="Celíaco"> Celíaco</label>
                    <label class="checkbox-item"><input type="checkbox" name="Preferencia" value="Vegano"> Vegano</label>
                </div>
                <button type="submit" id="submit-btn" class="btn-premium" style="width:100%; margin-top:20px;">ENVIAR CONFIRMACIÓN</button>
            </form>
            <div id="success-msg" style="display:none; padding:20px;"><h3>¡Gracias! ✨</h3></div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        function openEnvelope() {
            const song = document.getElementById('wedding-song');
            const envelope = document.getElementById('envelope');
            const wrapper = document.getElementById('wrapper');
            const mainContent = document.getElementById('main-content');
            
            song.volume = 0.2;
            song.play().catch(() => {});
            
            // 1. Abrir sobre
            envelope.classList.add('open');

            // 2. Transición a la web
            setTimeout(() => {
                wrapper.classList.add('hidden');
                mainContent.style.display = 'block';
                setTimeout(() => mainContent.style.opacity = '1', 100);
            }, 3500); // Damos tiempo a ver la carta centrarse
        }

        // Contador
        const weddingDate = new Date("Sep 20, 2026 18:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const d = weddingDate - now;
            if (d > 0) {
                document.getElementById("days").innerText = Math.floor(d / (1000 * 60 * 60 * 24));
                document.getElementById("hours").innerText = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById("mins").innerText = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));
            }
        }, 1000);

        // Formulario
        const form = document.getElementById('wedding-form');
        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "Enviando...";
            const scriptURL = 'https://script.google.com/macros/s/AKfycbwUGZoeNWv4jb2d-qHCZbF_6kQ2TxXqtwqewvMsKg3RBtth0FG9THm5zqDkz827w7q5EQ/exec';
            
            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: new URLSearchParams(new FormData(form)) })
            .then(() => {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                form.style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
            });
        });
    </script>
</body>
</html>
