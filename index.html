<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Boda</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-sobre: #d4a373;
            --color-papel: #fefae0;
            --color-texto: #606c38;
        }

        body { margin: 0; font-family: 'Playfair Display', serif; background: #f4f1ea; color: var(--color-texto); overflow-x: hidden; text-align: center; }
        
        /* --- SECCIÓN SOBRE --- */
        .envelope-wrapper {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            perspective: 1000px;
            background: #f4f1ea;
        }

        .envelope {
            position: relative;
            width: 320px;
            height: 220px;
            background: var(--color-sobre);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .envelope:before {
            content: "";
            position: absolute;
            top: 0; z-index: 3;
            border-top: 120px solid #bc8a5f;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            transition: transform 0.8s;
            transform-origin: top;
        }

        .envelope.open:before { transform: rotateX(180deg); z-index: 0; }

        .invitation-card {
            position: absolute;
            top: 10px; left: 10px;
            width: 300px; height: 200px;
            background: white;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: transform 0.8s;
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
        }

        .envelope.open .invitation-card { transform: translateY(-120px); }

        /* --- CONTENIDO DE LA WEB --- */
        #main-content {
            display: none;
            padding: 40px 20px;
            animation: fadeIn 2s ease;
        }

        h1 { font-size: 3rem; font-family: 'Dancing Script', cursive; }
        .section { margin: 60px 0; max-width: 800px; margin-left: auto; margin-right: auto; }

        /* Contador */
        #countdown {
            display: flex; justify-content: center; gap: 20px;
            font-size: 1.2rem; font-weight: bold; margin-top: 20px;
        }

        /* Responsive Map & Tally */
        iframe { width: 100%; border-radius: 15px; border: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <audio id="wedding-song" src="musica.mp3" preload="auto" loop></audio>

    <div class="envelope-wrapper" id="wrapper" onclick="openEnvelope()">
        <div class="envelope" id="envelope">
            <div class="invitation-card">
                <p>Nuestra Boda</p>
                <small>Toca para abrir</small>
            </div>
        </div>
    </div>

    <div id="main-content">
        <h1>🤵 ¡Nos Casamos! 👰</h1>
        
        <div class="section">
            <h2>Faltan:</h2>
            <div id="countdown">Cargando cuenta atrás...</div>
        </div>

        <div class="section">
            <h2>📍 Lugar de la Ceremonia</h2>
            <p>Aquí irá tu mapa interactivo</p>
        </div>

        <div class="section">
            <h2>📝 Confirma tu asistencia</h2>
            <iframe src="https://tally.so/r/ZjNNL0" height="600"></iframe>
        </div>
    </div>

    <script>
        function openEnvelope() {
            // Animación
            document.getElementById('envelope').classList.add('open');
            
            // Música (intenta reproducir)
            const song = document.getElementById('wedding-song');
            song.play().catch(e => console.log("El navegador bloqueó el inicio automático"));

            // Mostrar contenido tras la animación
            setTimeout(() => {
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('wrapper').style.height = 'auto';
                window.scrollTo({ top: 400, behavior: 'smooth' });
            }, 1000);
        }

        // --- CÓDIGO DEL CONTADOR ---
        const weddingDate = new Date("26 Junio, 2027 13:00:00").getTime(); // CAMBIA TU FECHA AQUÍ

        setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            
            document.getElementById("countdown").innerHTML = `
                <div>${days}d</div> : <div>${hours}h</div> : <div>${mins}m</div>
            `;
        }, 1000);
    </script>
</body>
</html>
