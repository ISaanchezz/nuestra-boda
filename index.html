<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda de Iván & Nuria</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-sobre: #e0d0b8; /* Tono papel lino */
            --color-sombra: rgba(0,0,0,0.2);
            --color-lacre: #962828;
        }

        body { margin: 0; font-family: 'Playfair Display', serif; background: #f4f1ea; overflow-x: hidden; text-align: center; }
        
        /* --- CONTENEDOR PRINCIPAL --- */
        .envelope-wrapper {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #fdfbf6 0%, #d8c8b0 100%);
            perspective: 1500px;
            transition: opacity 1s ease 0.5s; /* Tarda un poco más en desvanecerse */
        }

        .envelope-wrapper.hidden { opacity: 0; pointer-events: none; visibility: hidden; position: fixed; }

        /* --- EL SOBRE REALISTA --- */
        .envelope {
            position: relative;
            width: 400px;
            height: 280px;
            background: var(--color-sobre);
            border-radius: 4px;
            box-shadow: 0 15px 35px var(--color-sombra);
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.3s;
        }

        /* Solapa Superior */
        .flap {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-top: 150px solid #d4c4ac;
            border-left: 200px solid transparent;
            border-right: 200px solid transparent;
            box-sizing: border-box;
            transform-origin: top;
            z-index: 4; /* Por encima de todo al cerrar */
            transition: transform 0.8s ease-in-out;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
        }

        /* Cuerpo Frontal (Oculta la tarjeta) */
        .front {
            position: absolute;
            bottom: 0; left: 0; width: 0; height: 0;
            border-bottom: 150px solid var(--color-sobre);
            border-left: 200px solid #dccbb4;
            border-right: 200px solid #dccbb4;
            z-index: 3;
        }

        .front:after { /* Parte de abajo del frontal */
            content: "";
            position: absolute;
            bottom: -150px; left: -200px;
            width: 400px; height: 150px;
            background: var(--color-sobre);
            z-index: 3;
        }

        /* Sello de Lacre */
        .seal {
            position: absolute;
            top: 130px; left: 50%;
            transform: translateX(-50%);
            width: 65px; height: 65px;
            background: var(--color-lacre);
            border-radius: 50%;
            z-index: 5;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3), inset 0 0 10px rgba(0,0,0,0.2);
            display: flex; justify-content: center; align-items: center;
            color: #f1dca7; font-weight: bold; font-size: 1.4rem;
            border: 2px solid #7a1e1e;
            transition: opacity 0.4s, transform 0.4s;
        }

        /* La Invitación (Oculta al inicio) */
        .card {
            position: absolute;
            top: 10px; left: 20px;
            width: 360px; height: 240px;
            background: #fff;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            z-index: 2; /* Detrás del frontal */
            transition: transform 1s ease-in-out 0.6s; /* Sale después de abrir la solapa */
            display: flex; flex-direction: column; justify-content: center;
        }

        /* ESTADOS ABIERTOS */
        .envelope.open .flap { transform: rotateX(180deg); z-index: 1; }
        .envelope.open .seal { opacity: 0; transform: translateX(-50%) scale(0.5); }
        .envelope.open .card { transform: translateY(-180px); z-index: 5; }

        /* --- CONTENIDO WEB --- */
        #main-content { display: none; opacity: 0; transition: 1.5s; padding-bottom: 50px; }
        #main-content.visible { display: block; opacity: 1; }

        /* Mapas y Tally (Igual que antes pero pulido) */
        .section { margin: 60px auto; max-width: 900px; padding: 0 20px; }
        .card-map { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); flex: 1; min-width: 300px; }
        .btn-gps { display: inline-block; margin-top: 15px; padding: 12px 25px; background: #d4a373; color: white; text-decoration: none; border-radius: 50px; font-weight: bold; }

        @media (max-width: 450px) {
            .envelope { width: 320px; height: 220px; }
            .flap { border-top-width: 120px; border-left-width: 160px; border-right-width: 160px; }
            .front { border-bottom-width: 120px; border-left-width: 160px; border-right-width: 160px; }
            .front:after { bottom: -120px; left: -160px; width: 320px; height: 120px; }
            .card { width: 280px; height: 180px; left: 20px; }
            .seal { top: 100px; }
        }
    </style>
</head>
<body>

    <audio id="wedding-song" src="musica.mp3" preload="auto" loop></audio>

    <div class="envelope-wrapper" id="wrapper">
        <div class="envelope" id="envelope" onclick="openEnvelope()">
            <div class="flap"></div>
            <div class="front"></div>
            <div class="seal">I & N</div>
            <div class="card">
                <h2 style="font-family: 'Dancing Script'; color: #d4a373; margin:0;">¡Nos Casamos!</h2>
                <div style="font-size: 1.8rem; margin: 10px 0;">Iván & Nuria</div>
                <p style="font-size: 0.9rem; color: #888;">Toca para descubrir los detalles</p>
            </div>
        </div>
    </div>

    <div id="main-content">
        <h1 style="font-family: 'Dancing Script'; font-size: 3.5rem; color: #d4a373;">Iván & Nuria</h1>
        
        <div class="section">
            <h2 style="font-family: 'Dancing Script'; font-size: 2.5rem;">📍 Ubicaciones</h2>
            <div style="display: flex; flex-wrap: wrap; gap: 20px;">
                <div class="card-map">
                    <h3 style="font-family: 'Dancing Script'; font-size: 1.8rem;">Ceremonia</h3>
                    <p>Ermita Ntra. Sra. de los Remedios</p>
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3043.9535300000003!2d-4.562366!3d40.2767099!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd40465971b1e38f%3A0x6220116eaeefa951!2sErmita%20Nuestra%20Se%C3%B1ora%20de%20los%20Remedios!5e0!3m2!1ses!2ses!4v1700000000000" width="100%" height="250" style="border:0; border-radius:10px;"></iframe>
                    <a href="https://maps.app.goo.gl/uP4V2T6S2y6u4p1B9" target="_blank" class="btn-gps">🚗 Ver en GPS</a>
                </div>
                <div class="card-map">
                    <h3 style="font-family: 'Dancing Script'; font-size: 1.8rem;">Banquete</h3>
                    <p>Complejo Turístico La Cabaña</p>
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3043.433!2d-4.636!3d40.298!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd4043ee47352481%3A0x1d3a0b92e9446449!2sComplejo%20Tur%C3%ADstico%20La%20Caba%C3%B1a!5e0!3m2!1ses!2ses!4v1700000000000" width="100%" height="250" style="border:0; border-radius:10px;"></iframe>
                    <a href="https://maps.app.goo.gl/9tHq8fX7y9GzC9W66" target="_blank" class="btn-gps">🚗 Ver en GPS</a>
                </div>
            </div>
        </div>

        <div class="section" style="background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.05);">
            <h2 style="font-family: 'Dancing Script'; font-size: 2.8rem; color: #d4a373;">📝 Confirmación</h2>
            <iframe src="https://tally.so/r/ZjNNL0" width="100%" height="800" frameborder="0" style="border:none;"></iframe>
        </div>
    </div>

    <script>
        function openEnvelope() {
            // 1. Añade clase open al sobre
            document.getElementById('envelope').classList.add('open');
            
            // 2. Play música
            document.getElementById('wedding-song').play().catch(e => {});

            // 3. Esperar a que la invitación suba por completo antes de ocultar el sobre
            setTimeout(() => {
                document.getElementById('wrapper').classList.add('hidden');
                document.getElementById('main-content').classList.add('visible');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 2800); // Tiempo ampliado para disfrutar la animación
        }
    </script>
</body>
</html>
